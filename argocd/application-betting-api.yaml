apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: betting-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thranox/cd
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: betting-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

