apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: betting-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thranox/cd
    targetRevision: HEAD
    path: cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
