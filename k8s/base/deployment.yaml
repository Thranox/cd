apiVersion: apps/v1
kind: Deployment
metadata:
  name: betting-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: betting-api
  template:
    metadata:
      labels:
        app: betting-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: betting-api
          image: ghcr.io/thranox/betting-api:8be909a31eb414f3b1f0a5f630952e67da5cd783
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

